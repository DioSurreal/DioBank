spring:
  application:
    name: ledger-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ledgerdb}
    username: ${SPRING_DATASOURCE_USERNAME:ledger}
    password: ${SPRING_DATASOURCE_PASSWORD:ledger}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: ledger-service-pool
      maximum-pool-size: ${SPRING_DATASOURCE_MAX_POOL_SIZE:20}
      minimum-idle: ${SPRING_DATASOURCE_MIN_IDLE:2}
      connection-timeout: 30000
      validation-timeout: 5000
  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: ledger
    default-schema: ledger
    create-schemas: true
    validate-on-migrate: true
    baseline-on-migrate: false
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

server:
  port: ${SERVER_PORT:8080}

ledger:
  grpc:
    server:
      enabled: ${LEDGER_GRPC_ENABLED:true}
      port: ${LEDGER_GRPC_PORT:9090}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  health:
    db:
      enabled: true

logging:
  level:
    root: INFO
    com.diobank.ledger: INFO

